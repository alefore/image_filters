<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perspective Editor</title>
<style>
body { font-family: sans-serif; background: #1e1e1e; color: white; padding: 20px; }
.canvas-container { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
canvas {
    border: 2px solid #444;
    max-width: 100%;
    max-height: 70vh;
    object-fit: contain;
    background: #000;
    cursor: crosshair;
}
.controls { margin-bottom: 20px; }
button, input { padding: 8px 12px; margin-right: 10px; }
</style>
</head>
<body>
    <h2>Perspective Straightener</h2>
    <div class="controls">
        <input type="file" id="imageInput" accept="image/*">
        <button id="saveBtn" disabled>Save</button>
        <label for="distortion">Lens:</label>
        <input type="range" min="-1.0" max="1.0" step="0.01" value="0" id=distortion>
        <span id="status">Loading OpenCV.js...</span>
    </div>

    <div class="canvas-container">
        <div>
            <h3>Editor</h3>
            <canvas id="editorCanvas"></canvas>
        </div>
        <div>
            <h3>Preview</h3>
            <canvas id="previewCanvas"></canvas>
        </div>
    </div>

    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>
    <script type="module" src="./dist/main.js"></script>
</body>
</html>
