<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Filters</title>
<style>
body { font-family: sans-serif; background: #1e1e1e; color: white; padding: 20px; }
.canvas-container { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
canvas {
    border: 2px solid #444;
    object-fit: contain;
    background: #000;
    cursor: crosshair;
}
#controls { margin-bottom: 20px; }
button, input, select {
  padding: 8px 12px;
  margin-left: 4px;
  margin-right: 4px;
}
.filter-controls {
  position: relative;
  display: inline-block;
}

.add-filter-button {
  anchor-name: --filter-button-anchor;
}

.popover-menu {
  margin: 0;
  position-anchor: --filter-button-anchor;
  top: anchor(bottom);
  left: anchor(left);
  margin-top: 4px;
}

.filter-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
textarea#filters-config {
  border: 1px solid #d1d5db;
  border-radius: 6px;
  padding: 16px;
  overflow-x: auto;
  font-family: Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace;
  font-size: 14px;
  line-height: 1.5;
  white-space: pre;
  box-sizing: border-box;
  width: 100%;
  display: block;
  resize: vertical;
  background: inherit;
  color: inherit;
  tab-size: 2;
  field-sizing: content;
  min-height: 4lh;
  max-height: 80vh;
}
</style>
</head>
<body>
    <h2>Image Filters</h2>
    <div id="controls">
        Image: <input type="file" id="imageInput" accept="image/*">
        Config: <input type="file" id="configInput" accept=".json">
    </div>

    <div id="canvas-container"></div>
    <div id="filters-config"></div>

    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
