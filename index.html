<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perspective Editor</title>
<style>
body { font-family: sans-serif; background: #1e1e1e; color: white; padding: 20px; }
.canvas-container { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
canvas {
    border: 2px solid #444;
    max-width: 100%;
    max-height: 70vh;
    object-fit: contain;
    background: #000;
    cursor: crosshair;
}
.controls { margin-bottom: 20px; }
button, input { padding: 8px 12px; margin-right: 10px; }
</style>
</head>
<body>
    <h2>Perspective Straightener</h2>
    <div class="controls">
        Image: <input type="file" id="imageInput" accept="image/*">
        Config: <input type="file" id="configInput" accept=".json">
        <button id="saveBtn" disabled>Save</button>
        <button id="updateBtn" disabled>Update</button>
        <span id="status">Loading OpenCV.js...</span>
    </div>

    <div id="canvas-container"></div>
    <pre id="filter-config"></pre>

    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>
    <script type="module" src="./dist/main.js"></script>
</body>
</html>
